{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.n8nSecretName }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required when secrets.create=true" .Values.secrets.postgresPassword | quote }}
  N8N_ENCRYPTION_KEY: {{ required "secrets.n8nEncryptionKey is required when secrets.create=true" .Values.secrets.n8nEncryptionKey | quote }}
  {{- if .Values.n8n.license.enabled }}
  N8N_LICENSE_ACTIVATION_KEY: {{ required "secrets.n8nLicenseActivationKey is required when secrets.create=true and n8n.license.enabled=true" .Values.secrets.n8nLicenseActivationKey | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.cloudflaredSecretName }}
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  TUNNEL_TOKEN: {{ required "secrets.tunnelToken is required when secrets.create=true" .Values.secrets.tunnelToken | quote }}
{{- end }}
