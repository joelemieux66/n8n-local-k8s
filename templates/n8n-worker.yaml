apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-worker
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.n8n.worker.replicas }}
  selector:
    matchLabels:
      app: n8n-worker
  template:
    metadata:
      labels:
        app: n8n-worker
    spec:
      containers:
        - name: n8n-worker
          image: "{{ .Values.n8n.image.repository }}:{{ .Values.n8n.image.tag }}"
          imagePullPolicy: {{ .Values.n8n.image.pullPolicy }}
          command: ["n8n", "worker"]
          env:
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres
            - name: DB_POSTGRESDB_DATABASE
              value: n8n
            - name: DB_POSTGRESDB_USER
              value: n8n
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.n8nSecretName }}
                  key: POSTGRES_PASSWORD
            - name: EXECUTIONS_MODE
              value: queue
            - name: QUEUE_BULL_REDIS_HOST
              value: redis
            - name: QUEUE_BULL_REDIS_PORT
              value: "6379"
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.n8nSecretName }}
                  key: N8N_ENCRYPTION_KEY
            {{- if .Values.n8n.license.enabled }}
            - name: N8N_LICENSE_ACTIVATION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.n8n.license.secretName }}
                  key: {{ .Values.n8n.license.secretKey }}
            {{- end }}
            - name: N8N_HOST
              value: {{ .Values.n8n.publicUrl.host | quote }}
            - name: N8N_PROTOCOL
              value: {{ .Values.n8n.publicUrl.protocol | quote }}
            - name: N8N_PORT
              value: {{ .Values.n8n.publicUrl.port | quote }}
            - name: WEBHOOK_URL
              value: {{ .Values.n8n.publicUrl.webhookUrl | quote }}
            - name: N8N_EDITOR_BASE_URL
              value: {{ .Values.n8n.publicUrl.editorBaseUrl | quote }}
            {{- if .Values.n8n.otel.enabled }}
            - name: N8N_OTEL_ENABLED
              value: "true"
            - name: N8N_OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.n8n.otel.endpoint | quote }}
            - name: N8N_OTEL_EXPORTER_OTLP_TRACING_PATH
              value: {{ .Values.n8n.otel.tracingPath | quote }}
            - name: N8N_OTEL_EXPORTER_SERVICE_NAME
              value: {{ .Values.n8n.otel.serviceName | quote }}
            - name: N8N_OTEL_TRACES_SAMPLE_RATE
              value: {{ .Values.n8n.otel.sampleRate | quote }}
            - name: N8N_OTEL_TRACES_INCLUDE_NODE_SPANS
              value: {{ .Values.n8n.otel.includeNodeSpans | quote }}
            - name: N8N_OTEL_TRACES_PRODUCTION_ONLY
              value: {{ .Values.n8n.otel.productionOnly | quote }}
            - name: N8N_OTEL_TRACES_INJECT_OUTBOUND
              value: {{ .Values.n8n.otel.injectOutbound | quote }}
            {{- end }}
