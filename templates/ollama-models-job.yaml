{{- if and .Values.ollama.enabled .Values.ollama.models }}
apiVersion: batch/v1
kind: Job
metadata:
  name: ollama-model-bootstrap
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: ollama-model-bootstrap
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          env:
            - name: OLLAMA_HOST
              value: http://ollama.{{ .Values.namespace }}.svc.cluster.local:11434
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu
              {{- range .Values.ollama.models }}
              ollama pull {{ . | quote }}
              {{- end }}
{{- end }}
