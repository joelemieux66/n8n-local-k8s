# Copy this file to values.local.yaml and update it for your local cluster.
# values.local.yaml is ignored by Git.

n8n:
  publicUrl:
    host: n8n.example.com
    protocol: https
    port: "5678"
    webhookUrl: https://n8n.example.com/
    editorBaseUrl: https://n8n.example.com/

  proxyHops: "1"

  otel:
    enabled: true
    endpoint: http://otel-collector:4318
    tracingPath: /v1/traces
    serviceName: n8n-local
    sampleRate: "1.0"
    includeNodeSpans: "true"
    productionOnly: "false"
    injectOutbound: "true"

  license:
    enabled: false

ollama:
  enabled: true
  persistence:
    size: 30Gi
  models:
    - llama3.1
